name: Lite CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-lite-skill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check platform synchronization
        run: python scripts/sync_platform_packages.py --check

      - name: Run Lite test suite
        run: python tests/run_lite_tests.py

      - name: Build deterministic release archives
        run: python scripts/build_release_packages.py --output-dir tests/sandbox/ci-release

      - name: Verify release archives
        run: python scripts/build_release_packages.py --verify --output-dir tests/sandbox/ci-release
